# PowerDNS Authoritative — Passive primary B (profile dual-primary)
# Serves auth via dnsdist; receives AXFR from active primary A.
# API disabled until switchover (see dual-primary-switchover runbook).

launch=gsqlite3
gsqlite3-database=/var/lib/powerdns/pdns.sqlite3

local-address=0.0.0.0
local-port=53

secondary=yes
autosecondary=yes
secondary-do-renotify=yes

webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=10.89.0.0/8,127.0.0.0/8
api=no
api-key=changeme-pdns-api-key

loglevel=4
