# PowerDNS Authoritative — Secondary (autosecondary)
# SQLite backend supports superslave autoprimary registration.

launch=gsqlite3
gsqlite3-database=/var/lib/powerdns/pdns.sqlite3
gsqlite3-dnssec=yes

local-address=0.0.0.0
local-port=53

secondary=yes
autosecondary=yes
secondary-do-renotify=yes

allow-notify-from=10.89.2.11

webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=10.89.0.0/8,127.0.0.0/8

loglevel=4
