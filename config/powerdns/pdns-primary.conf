# PowerDNS Authoritative — Primary
# Served by deploy/compose; PostgreSQL backend on control_net.

launch=gpgsql
gpgsql-host=postgres
gpgsql-port=5432
gpgsql-dbname=pdns
gpgsql-user=pdns
gpgsql-password=changeme-pdns-db
gpgsql-dnssec=yes

local-address=0.0.0.0
local-port=53

primary=yes
default-soa-edit=INCREMENT

# API + metrics
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=10.89.0.0/8,127.0.0.0/8
api=yes
api-key=changeme-pdns-api-key

# Zone transfer to secondaries
allow-axfr-ips=10.89.2.0/24
also-notify=10.89.2.12,10.89.2.13

loglevel=4
