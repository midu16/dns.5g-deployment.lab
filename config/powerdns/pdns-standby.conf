# PowerDNS Authoritative — Standby primary (profile ha)
# Points at postgres-replica; API disabled until promotion.

launch=gpgsql
gpgsql-host=postgres-replica
gpgsql-port=5432
gpgsql-dbname=pdns
gpgsql-user=pdns
gpgsql-password=changeme-pdns-db
gpgsql-dnssec=yes

local-address=0.0.0.0
local-port=53

primary=yes
default-soa-edit=INCREMENT

webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=10.89.0.0/8,127.0.0.0/8
api=no
api-key=changeme-pdns-api-key

allow-axfr-ips=10.89.2.0/24
also-notify=10.89.2.12,10.89.2.13

loglevel=4
