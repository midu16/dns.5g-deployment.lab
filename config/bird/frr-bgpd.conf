! FRR BGP route reflector for anycast lab
hostname frr-router
password zebra
enable password zebra

router bgp 65000
 bgp router-id 10.89.6.1
 no bgp default ipv4-unicast
 neighbor EU peer group
 neighbor EU remote-as 65004
 neighbor EU update-source 10.89.4.1
 neighbor 10.89.4.20 peer-group EU
 neighbor US peer group
 neighbor US remote-as 65005
 neighbor US update-source 10.89.5.1
 neighbor 10.89.5.20 peer-group US
 !
 address-family ipv4 unicast
  neighbor EU activate
  neighbor EU route-reflector-client
  neighbor US activate
  neighbor US route-reflector-client
 exit-address-family

line vty
