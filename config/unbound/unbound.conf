server:
  chroot: ""
  directory: "/opt/unbound/etc/unbound"
  do-daemonize: no
  use-syslog: no
  username: ""
  verbosity: 1
  interface: 0.0.0.0
  port: 53
  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes
  hide-identity: yes
  hide-version: yes
  harden-glue: yes
  harden-dnssec-stripped: yes
  use-caps-for-id: yes
  cache-min-ttl: 60
  cache-max-ttl: 86400
  prefetch: yes
  num-threads: 2

  # Strict DNSSEC validation
  val-permissive-mode: no
  val-log-level: 1

  # Allow lab networks
  access-control: 10.89.0.0/16 allow
  access-control: 127.0.0.0/8 allow
  access-control: 172.16.0.0/12 allow
  access-control: 0.0.0.0/0 refuse

  # Extended statistics for Prometheus (via unbound-exporter or stats endpoint)
  statistics-interval: 0
  extended-statistics: yes
  statistics-cumulative: yes

  private-domain: "5g-deployment.lab"
  private-domain: "infra.5g-deployment.lab"
  private-domain: "api.hub.5g-deployment.lab"

# trust-anchor-file added by bootstrap-zones.sh after pdnsutil secure-zone
# trust-anchor-file: "/etc/unbound/trust-anchor.conf"

# Remote control disabled in container (no TLS certs baked in)
# remote-control:
#   control-enable: yes

# Split-horizon: internal lab zones forward to authoritative dnsdist VIP
forward-zone:
  name: "5g-deployment.lab"
  forward-addr: 10.89.3.21@5300
  forward-first: no

forward-zone:
  name: "infra.5g-deployment.lab"
  forward-addr: 10.89.3.21@5300
  forward-first: no

forward-zone:
  name: "api.hub.5g-deployment.lab"
  forward-addr: 10.89.3.21@5300
  forward-first: no

include: "/opt/unbound/etc/unbound/views.conf"
