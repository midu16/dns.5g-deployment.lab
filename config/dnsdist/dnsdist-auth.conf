-- dnsdist authoritative front-end
-- Pools PowerDNS primary + secondaries; no recursion.

setLocal("0.0.0.0:5300")

newServer({
  address = "10.89.2.11:53",
  name = "pdns-primary",
  checkType = "A",
  checkName = "ns1.infra.5g-deployment.lab.",
  checkInterval = 10,
  maxCheckFailures = 3,
  rise = 2
})

newServer({
  address = "10.89.2.12:53",
  name = "pdns-secondary-1",
  checkType = "A",
  checkName = "ns1.infra.5g-deployment.lab.",
  checkInterval = 10,
  maxCheckFailures = 3,
  rise = 2
})

newServer({
  address = "10.89.2.13:53",
  name = "pdns-secondary-2",
  checkType = "A",
  checkName = "ns1.infra.5g-deployment.lab.",
  checkInterval = 10,
  maxCheckFailures = 3,
  rise = 2
})

-- Optional dual-primary profile (10.89.2.14)
newServer({
  address = "10.89.2.14:53",
  name = "pdns-primary-b",
  checkType = "A",
  checkName = "ns1.infra.5g-deployment.lab.",
  checkInterval = 10,
  maxCheckFailures = 3,
  rise = 2
})

setServerPolicy(firstAvailable)

addACL("10.89.3.0/24")
addACL("10.89.1.0/24")
addACL("127.0.0.0/8")
addACL("::1/128")

-- PowerDNS authoritative backends ignore RD; Unbound forward path sets RD=1

webserver("0.0.0.0:8083")
setWebserverConfig({
  password = "robustdns",
  apiKey = "robustdns-api",
  statsRequireAuthentication = false
})
