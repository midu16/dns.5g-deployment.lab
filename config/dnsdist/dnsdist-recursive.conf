-- dnsdist recursive front-end
-- Pools Unbound validating resolvers.

setLocal("0.0.0.0:5353", { reusePort = true })

newServer({
  address = "10.89.3.11:53",
  name = "unbound-1",
  checkDisabled = true
})

newServer({
  address = "10.89.3.12:53",
  name = "unbound-2",
  checkDisabled = true
})

setServerPolicy(leastOutstanding)

addACL("10.89.0.0/16")
addACL("10.89.2.0/24")
addACL("127.0.0.0/8")
addACL("172.16.0.0/12")
addACL("192.168.200.0/24")
addACL("::1/128")

webserver("0.0.0.0:8083")
setWebserverConfig({
  password = "robustdns",
  apiKey = "robustdns-api",
  statsRequireAuthentication = false
})

pcall(function() dofile("/etc/dnsdist/policies/load.lua") end)
