---
name: OctoDNS

on:
  pull_request:
    paths:
      - 'zones/**'
      - 'octodns/**'
  push:
    branches: [main]
    paths:
      - 'zones/**'
      - 'octodns/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OctoDNS
        run: pip install -r octodns/requirements.txt

      - name: Validate zone syntax
        run: octodns-validate --config-file octodns/config.yaml

  trigger-sync:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitOps reconcile webhook
        env:
          GITOPS_WEBHOOK_URL: ${{ secrets.GITOPS_WEBHOOK_URL }}
          GITOPS_WEBHOOK_TOKEN: ${{ secrets.GITOPS_WEBHOOK_TOKEN }}
        run: |
          if [[ -z "$GITOPS_WEBHOOK_URL" ]]; then
            echo "GITOPS_WEBHOOK_URL not set — skipping webhook trigger."
            echo "Configure secret to e.g. http://gitops.example.com:8088/sync"
            exit 0
          fi
          curl -sf -X POST "$GITOPS_WEBHOOK_URL" \
            -H "Authorization: Bearer ${GITOPS_WEBHOOK_TOKEN}" \
            -H "Content-Type: application/json"
