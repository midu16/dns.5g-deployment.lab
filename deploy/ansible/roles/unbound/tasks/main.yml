---
# Unbound validating resolver role (skeleton)
- name: Install unbound
  ansible.builtin.dnf:
    name: unbound
    state: present
  when: ansible_os_family == "RedHat"

- name: Deploy unbound.conf
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../config/unbound/unbound.conf"
    dest: /etc/unbound/unbound.conf
    mode: "0640"
  notify: Restart unbound

- name: Enable unbound
  ansible.builtin.systemd:
    name: unbound
    enabled: true
    state: started
