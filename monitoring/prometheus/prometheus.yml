global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: dnsdist-auth
    static_configs:
      - targets: ["10.89.2.10:8083"]
    metrics_path: /metrics

  - job_name: dnsdist-recursive
    static_configs:
      - targets: ["10.89.3.10:8083"]
    metrics_path: /metrics

  - job_name: powerdns-primary
    static_configs:
      - targets: ["10.89.2.11:8081"]
    metrics_path: /metrics

  - job_name: powerdns-secondary-1
    static_configs:
      - targets: ["10.89.2.12:8081"]
    metrics_path: /metrics

  - job_name: powerdns-secondary-2
    static_configs:
      - targets: ["10.89.2.13:8081"]
    metrics_path: /metrics

  - job_name: blackbox-dns-auth
    metrics_path: /probe
    params:
      module: [dns_auth]
    static_configs:
      - targets:
          - 10.89.2.10:5300
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 10.89.1.12:9115

  - job_name: blackbox-dns-recursive
    metrics_path: /probe
    params:
      module: [dns_recursive]
    static_configs:
      - targets: ["10.89.3.10:5353"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 10.89.1.12:9115
